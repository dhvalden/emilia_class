<!doctype html>
<html lang="en">
	<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uses of LLMs in Social Sciences — Daniel Valdenegro</title>

		<title>reveal.js</title>

		<link rel="stylesheet" href="dist/reset.css">
		<link rel="stylesheet" href="dist/reveal.css">
		<link rel="stylesheet" href="dist/theme/white.css">
		<!-- Theme used for syntax highlighted code -->
		<link rel="stylesheet" href="plugin/highlight/monokai.css">
  <style>
    /* Minimal, austere styling tuned for Oxford seminar */
    :root{
      --accent: #0a4d8c; /* restrained Oxford-blue accent */
      --max-width: 920px;
    }

    /* Increase default font-size for readability in seminar rooms */
    html { font-size: 18px; }

    /* Big, centred title slide */
    .reveal .slides section.title-slide {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      text-align: center;
    }

    .title-block {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .institution {
      letter-spacing: 0.08em;
      font-size: 0.9rem;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 0.6rem;
      font-family: "Helvetica Neue", Arial, sans-serif;
      opacity: 0.95;
    }

    h1 {
      margin: 0.25rem 0 0.5rem 0;
      font-weight: 600;
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 1.25rem;
      line-height: 1.05;
      color: #111;
    }

    .author {
      margin-top: 0.5rem;
      font-size: 1.05rem;
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: #222;
    }

    .meta {
      margin-top: 1.25rem;
      font-size: 0.9rem;
      color: #444;
    }

    /* footer small */
    .slide-footer {
      position: absolute;
      bottom: 18px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.78rem;
      color: #666;
      letter-spacing: 0.02em;
    }

    /* Keep content narrow on subsequent slides */
    .reveal .slides section .content {
      max-width: var(--max-width);
      margin: 0 auto;
    }
    .reveal .katex-display {
  font-size: 1.3rem;
}

  </style>
  
	</head>
	<body>
  <div class="reveal">
    <div class="slides">

      <!-- Title slide -->
      <section class="title-slide">
        <div class="title-block">
          <div class="institution">Department of Sociology — University of Oxford</div>

          <h1>
            Use of LLMs for Information Extraction in free text of Criminal gangs descriptions<br>
            
          </h1>

          <div class="author">Daniel Valdenegro</div>

          <div class="meta">6 March 2026</div>
        </div>

        <div class="slide-footer">Department of Sociology</div>
      </section>
</div>
</div>

		<script src="dist/reveal.js"></script>
		<script src="plugin/notes/notes.js"></script>
		<script src="plugin/markdown/markdown.js"></script>
		<script src="plugin/highlight/highlight.js"></script>
    <script src="plugin/math/math.js"></script>
		<script>
			// More info about initialization & config:
			// - https://revealjs.com/initialization/
			// - https://revealjs.com/config/
			Reveal.initialize({
				hash: true,
				showHiddenSlides: true,

				slideNumber: 'c/t',

				// Learn about plugins: https://revealjs.com/plugins/
				plugins: [ RevealMarkdown, RevealHighlight, RevealNotes, RevealMath.KaTeX ]
			});
		</script>
    
		
	</body>
</html>
